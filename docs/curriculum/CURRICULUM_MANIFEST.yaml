daily_pass_bar: 80
elite_pass_bar: 90
graduation_tiers:
  graduate:
    average_score: 80
    all_days_pass: true
    all_zero_tolerance_pass: true
    no_major_process_weakness: true
  strong_fde:
    average_score: 85
    defends_tradeoffs: true
    produces_reusable_artifacts: true
    handles_hostile_review: true
  top_talent:
    average_score: 90
    transfer_capstone_pass: true
    executive_communication: true
    auditor_communication: true
    security_communication: true
    ops_communication: true
    correct_go_nogo_under_pressure: true
days:
- id: '01'
  title: Agentic Systems Fundamentals, Business Value, and FDE Judgment
  notebook_file: notebooks/day_1_agentic_fundamentals.py
  primary_doc_file: docs/DAY_01.md
  legacy_doc_files: []
  rubric_weights:
    agent_fit_signals: 25
    rejection_criteria: 20
    waf_trust_tradeoff: 20
    business_framing: 15
    oral_defense: 20
  artifact_files:
  - docs/curriculum/artifacts/day01/AGENT_FIT_MEMO.md
  - docs/curriculum/artifacts/day01/NO_AGENT_MEMO.md
  - docs/curriculum/artifacts/day01/FDE_MENTAL_MODELS.md
  portal_to_script_mapping:
    portal_surface: Foundry or Azure OpenAI extraction payload and runtime endpoint
      health
    bridge_file: notebooks/bridges/day01_trust_boundary.md
    production_targets:
    - src/aegisap/day_01/normalizers.py
    - src/aegisap/day_01/service.py
  oral_defense_prompts:
  - What alternative automation approach did you reject for this pain point, and why
    does the agent design win on this dimension?
  - What is the blast radius if the agent acts on a misclassified invoice? Name the
    downstream systems and approvers affected.
  - Who in a real enterprise must sign off on introducing an agentic system into a
    financial workflow, and what audit evidence would they demand before go-live?
  zero_tolerance: []
  capstone_flags:
    capstone_a: true
    capstone_b: false
  phase: phase_1_trust_boundary
  scenario_dir: scenarios/day01
  injection_command: uv run aegisap-lab incident start --day 01
  revert_state: .aegisap-lab/state/day01.json
  verification_commands:
  - uv run python -m pytest tests/test_day_01_money.py tests/test_day_01_fixtures.py
    -q
  - uv run aegisap-lab artifact rebuild --day 01
  review_contract:
    evaluator_profile: wave1-day01-trust-boundary
    human_required: true
  customer_context: A finance operations lead is blocking go-live after a valid European
    supplier invoice was rejected. They want proof that the deterministic trust boundary
    can be repaired without widening the blast radius.
  persistent_constraints:
  - id: regulated_invoice_auditability
    type: process
    description: Every financial decision path must leave auditable evidence that
      survives hostile review.
    introduced_on: '01'
    persists: true
  mastery_gates:
  - id: day01_repo_evidence
    mode: blocking
    command: uv run python -m pytest tests/test_day_01_money.py tests/test_day_01_fixtures.py
      -q && uv run aegisap-lab artifact rebuild --day 01
    success_marker: '"day": "01"'
    covers_constraints:
    - regulated_invoice_auditability
    evidence_source: artifact
  chaos_gate:
    failure_signal: A locale-formatted invoice amount is rejected even though the
      extraction payload and endpoint health are clean.
    diagnostic_surface: Foundry extraction payload, notebook fixture replay, and trust-boundary
      parser behavior.
    expected_recovery_artifact: build/day1/golden_thread_day1.json
    time_box_minutes: 20
    facilitator_intervention_rule: If the learner misses the time box, the facilitator
      must use FDE_DEBUGGING_FRAMEWORK.md, keep hands off the keyboard, and ask only
      topology, network, RBAC, and log-evidence questions.
