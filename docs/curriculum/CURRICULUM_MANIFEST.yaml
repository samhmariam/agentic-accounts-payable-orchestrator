  persistent_constraints:
  - id: regulated_invoice_auditability
    type: process
    description: Every financial decision path must leave auditable evidence that survives hostile review.
    introduced_on: '01'
    persists: true
  mastery_gates:
  - id: day01_repo_evidence
    mode: blocking
    command: uv run python -m pytest tests/test_day_01_money.py tests/test_day_01_fixtures.py -q && uv run aegisap-lab artifact rebuild --day 01
    success_marker: '"day": "01"'
    covers_constraints:
    - regulated_invoice_auditability
    evidence_source: artifact
  chaos_gate:
    failure_signal: A locale-formatted invoice amount is rejected even though the extraction payload and endpoint health are clean.
    expected_recovery_artifact: build/day1/golden_thread_day1.json
    time_box_minutes: 20
    facilitator_intervention_rule: If the learner misses the time box, the facilitator must use FDE_DEBUGGING_FRAMEWORK.md, keep hands off the keyboard, and ask only topology, network, RBAC, and log-evidence questions.
    starting_signal: Foundry extraction payload, notebook fixture replay, and trust-boundary parser behavior.
