name: Principal Review

on:
  pull_request:
    branches:
      - "cohort/**"
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  principal-review:
    if: startsWith(github.base_ref, 'cohort/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev --extra day9

      - name: Fetch PR refs
        run: |
          git fetch --no-tags origin ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }}

      - name: Compile principal-review strategy
        run: |
          uv run python scripts/compile_principal_review_dspy.py \
            --dataset data/review/principal_review_telemetry.jsonl \
            --out-json build/review/principal_review_strategy.json

      - name: Generate principal review draft
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_CHAT_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
        run: |
          uv run python scripts/principal_review.py \
            --base-ref "${{ github.event.pull_request.base.sha }}" \
            --head-ref "${{ github.event.pull_request.head.sha }}" \
            --mode blocking \
            --strategy-file build/review/principal_review_strategy.json \
            --out-json build/review/principal_review.json \
            --out-md build/review/principal_review.md \
            --telemetry-out build/review/principal_review_telemetry.json

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: principal-review-${{ github.event.pull_request.number }}
          path: |
            build/review/principal_review_strategy.json
            build/review/principal_review.json
            build/review/principal_review.md
            build/review/principal_review_telemetry.json

      - name: Add job summary
        run: cat build/review/principal_review.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish principal review comment
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          REVIEW_MARKDOWN_PATH: build/review/principal_review.md
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- aegisap-principal-review -->";
            const body = `${marker}\n${fs.readFileSync(process.env.REVIEW_MARKDOWN_PATH, "utf8")}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) => comment.user?.type === "Bot" && comment.body?.includes(marker),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail on blocking findings
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path("build/review/principal_review.json").read_text(encoding="utf-8"))
          if payload.get("blocking"):
              print("Blocking principal-review findings detected:")
              for reason in payload.get("blocking_reasons", []):
                  print(f"- {reason}")
              sys.exit(1)
          print("No blocking principal-review findings detected.")
          PY
