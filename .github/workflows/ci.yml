name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev --extra day9

      - name: Run tests
        run: uv run python -m pytest -q

      - name: Compile Python entrypoints
        run: uv run python -m compileall src scripts evals

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Install Bicep
        run: az bicep install

      - name: Validate Bicep templates
        run: |
          az bicep build --file infra/core.bicep
          az bicep build --file infra/full.bicep
          az bicep build --file infra/aca/staging.bicep
          az bicep build --file infra/aca/prod.bicep
          az bicep build --file infra/modules/container_app.bicep
          az bicep build --file infra/modules/role_assignments.bicep
          az bicep build --file infra/modules/diagnostic_settings.bicep
          az bicep build --file infra/monitoring/alerts/alerts.bicep

      - name: Build API container image
        run: docker build -f docker/Dockerfile.api -t aegisap-api:${{ github.sha }} .

      - name: Build worker container image
        run: docker build -f docker/Dockerfile.worker -t aegisap-worker:${{ github.sha }} .
