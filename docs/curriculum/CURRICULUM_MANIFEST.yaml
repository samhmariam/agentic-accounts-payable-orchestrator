  - id: day01_incident_replay
    default: true
    mode: incident
    name: Day 1 incident replay
    description: Uses the existing incident scenario as the Phase 2 automated drill so the learner must debug from the first signal and restore the repo-backed repair path.
    expected_signal: A locale-formatted invoice amount is rejected even though the extraction payload and endpoint health are clean.
