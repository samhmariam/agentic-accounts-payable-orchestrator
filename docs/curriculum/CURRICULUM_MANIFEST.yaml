      - docs/curriculum/artifacts/day02/RACI_MATRIX.md
      - docs/curriculum/artifacts/day02/NFR_REGISTER.md
      - docs/curriculum/artifacts/day02/ADR_001_SCOPE_AND_BOUNDARIES.md
    oral_defense_prompts:
      - "Which NFR did you classify as zero-tolerance and why can it not be tuned post-launch without a full change-board review?"
      - "If the security stakeholder and the process owner disagree on latency vs control, whose position wins and through what governance mechanism?"
      - "Who must approve the scope ADR in production, what evidence section would they challenge first, and what would trigger a rollback?"
