    - name: Normalizers
      surface_type: application
    - name: Service
      surface_type: application
  zero_tolerance: []
  capstone_flags:
    capstone_a: true
    capstone_b: false
  phase: phase_1_trust_boundary
  injection_command: uv run aegisap-lab incident start --day 01
  revert_state: .aegisap-lab/state/day01.json
  verification_commands:
