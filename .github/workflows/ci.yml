name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -q

      - name: Compile Python entrypoints
        run: uv run python -m compileall src scripts

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Install Bicep
        run: az bicep install

      - name: Validate Bicep templates
        run: |
          az bicep build --file infra/core.bicep
          az bicep build --file infra/full.bicep
          az bicep build --file infra/modules/container_app.bicep

      - name: Build container image
        run: docker build .
