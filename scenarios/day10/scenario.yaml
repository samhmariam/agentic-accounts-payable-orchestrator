day: "10"
title: "False-Green Release Envelope"
phase: "phase_4_elite_operations"
baseline_track: "core"
baseline_reprovision_command: "uv run python -m aegisap.lab.baseline --track core --scenario day10"
setup:
  apply_diff: "seed/incident.patch"
  azure_script: "uv run python -m aegisap.lab.preview_azure --scenario day10 --action break"
  customer_drop: "customer_artifact.md"
validation:
  reproduce_command: "uv run python -m pytest tests/day10/test_deployment_contract.py tests/day10/test_release_security.py tests/day10/test_release_envelope.py tests/training/test_checkpoints.py tests/api/test_app.py -q"
  ci_command: "uv run python -m pytest tests/day10/test_deployment_contract.py tests/day10/test_release_security.py tests/day10/test_release_envelope.py tests/training/test_checkpoints.py tests/api/test_app.py -q"
teardown:
  revert_diff: "seed/incident.patch"
  azure_script: "uv run python -m aegisap.lab.preview_azure --scenario day10 --action restore"
  cleanup:
    - "customer_artifact.md"
review:
  evaluator_profile: "wave3-day10-release-board"
  human_required: true
