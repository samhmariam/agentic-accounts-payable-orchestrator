---
# AegisAP Curriculum Manifest
# Single source of truth for the 14-day FDE programme.
# Tests, notebooks, and docs MUST derive from this file rather than duplicating values.
#
# Schema per day:
#   id              : zero-padded day number (string)
#   title           : canonical day title
#   notebook_file   : repo-root-relative path to the Marimo notebook
#   primary_doc_file: repo-root-relative path to the primary day doc (may not exist yet at manifest creation)
#   legacy_doc_files: superseded docs kept for reference; listed here so tests can assert they still exist
#   rubric_weights  : five dimensions summing exactly to 100
#   artifact_files  : all trainee-produced artifact paths under docs/curriculum/artifacts/
#   oral_defense_prompts: exactly 3 per day (universal + day-specific framing)
#   zero_tolerance  : conditions that hard-fail the day regardless of total score;
#                     applies to assessed artifacts and technical decisions, not oral-defense points alone
#   capstone_flags  : capstone_a and capstone_b participation booleans

daily_pass_bar: 80
elite_pass_bar: 90

graduation_tiers:
  graduate:
    average_score: 80
    all_days_pass: true
    all_zero_tolerance_pass: true
    no_major_process_weakness: true
  strong_fde:
    average_score: 85
    defends_tradeoffs: true
    produces_reusable_artifacts: true
    handles_hostile_review: true
  top_talent:
    average_score: 90
    transfer_capstone_pass: true
    executive_communication: true
    auditor_communication: true
    security_communication: true
    ops_communication: true
    correct_go_nogo_under_pressure: true

days:
  - id: "01"
    title: "Agentic Systems Fundamentals, Business Value, and FDE Judgment"
    notebook_file: notebooks/day_1_agentic_fundamentals.py
    primary_doc_file: docs/DAY_01.md
    legacy_doc_files: []
    rubric_weights:
      agent_fit_signals: 25
      rejection_criteria: 20
      waf_trust_tradeoff: 20
      business_framing: 15
      oral_defense: 20
    artifact_files:
      - docs/curriculum/artifacts/day01/AGENT_FIT_MEMO.md
      - docs/curriculum/artifacts/day01/NO_AGENT_MEMO.md
      - docs/curriculum/artifacts/day01/FDE_MENTAL_MODELS.md
    oral_defense_prompts:
      - "What alternative automation approach did you reject for this pain point, and why does the agent design win on this dimension?"
      - "What is the blast radius if the agent acts on a misclassified invoice? Name the downstream systems and approvers affected."
      - "Who in a real enterprise must sign off on introducing an agentic system into a financial workflow, and what audit evidence would they demand before go-live?"
    zero_tolerance: []
    capstone_flags:
      capstone_a: true
      capstone_b: false

