name: Deploy Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_sha:
        description: Commit SHA to deploy. Defaults to the current ref SHA.
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    env:
      RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      ACR_NAME: ${{ secrets.AEGISAP_ACR_NAME }}
      STAGING_APP_NAME: ${{ vars.AEGISAP_STAGING_APP_NAME }}
      CONTAINER_APPS_ENVIRONMENT_ID: ${{ secrets.AEGISAP_CONTAINERAPPS_ENVIRONMENT_ID }}
      WORKLOAD_IDENTITY_RESOURCE_ID: ${{ secrets.AEGISAP_WORKLOAD_IDENTITY_RESOURCE_ID }}
      APPINSIGHTS_CONNECTION_STRING: ${{ secrets.AEGISAP_APPLICATIONINSIGHTS_CONNECTION_STRING }}
      APPINSIGHTS_NAME: ${{ vars.AEGISAP_APPINSIGHTS_NAME }}
      OPENAI_ENDPOINT: ${{ secrets.AEGISAP_OPENAI_ENDPOINT }}
      OPENAI_API_VERSION: ${{ vars.AEGISAP_OPENAI_API_VERSION }}
      OPENAI_CHAT_DEPLOYMENT: ${{ vars.AEGISAP_OPENAI_CHAT_DEPLOYMENT }}
      SEARCH_ENDPOINT: ${{ secrets.AEGISAP_SEARCH_ENDPOINT }}
      SEARCH_DAY3_INDEX: ${{ vars.AEGISAP_SEARCH_DAY3_INDEX }}
      STORAGE_ACCOUNT_URL: ${{ secrets.AEGISAP_STORAGE_ACCOUNT_URL }}
      STORAGE_CONTAINER: ${{ vars.AEGISAP_STORAGE_CONTAINER }}
      POSTGRES_HOST: ${{ secrets.AEGISAP_POSTGRES_HOST }}
      POSTGRES_PORT: ${{ vars.AEGISAP_POSTGRES_PORT }}
      POSTGRES_DB: ${{ vars.AEGISAP_POSTGRES_DB }}
      POSTGRES_USER: ${{ vars.AEGISAP_POSTGRES_USER }}
      KEY_VAULT_URI: ${{ secrets.AEGISAP_KEY_VAULT_URI }}
      LANGSMITH_PROJECT: ${{ vars.AEGISAP_LANGSMITH_STAGING_PROJECT }}
      LANGSMITH_ENDPOINT: ${{ vars.AEGISAP_LANGSMITH_ENDPOINT }}
      IMAGE_NAME_API: aegisap-api
      IMAGE_NAME_WORKER: aegisap-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v5

      - name: Resolve release SHA
        id: release
        run: |
          RELEASE_SHA="${{ github.event.inputs.git_sha || github.sha }}"
          echo "sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=${RELEASE_SHA:0:12}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: uv sync --extra dev --extra day9

      - name: Validate release security posture inputs
        run: |
          test -n "$KEY_VAULT_URI"
          test -n "$WORKLOAD_IDENTITY_RESOURCE_ID"
          if [ -n "${ACR_USERNAME:-}" ] || [ -n "${ACR_PASSWORD:-}" ]; then
            echo "Registry username/password fallback is not allowed." >&2
            exit 1
          fi
          if [ -n "${LANGSMITH_API_KEY:-}" ] && printf '%s' "$LANGSMITH_API_KEY" | grep -Eq '^lsv2_pt_'; then
            echo "LangSmith acceptance checks must use a service-scoped key, not a personal access token." >&2
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure CLI Bicep
        run: az bicep install

      - name: Resolve ACR login server and Application Insights app id
        id: azure
        run: |
          ACR_LOGIN_SERVER="$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)"
          APP_ID="$(az monitor app-insights component show --app "$APPINSIGHTS_NAME" --resource-group "$RESOURCE_GROUP" --query appId -o tsv)"
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"
          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build and push API image
        run: |
          docker build -f docker/Dockerfile.api -t "${{ steps.azure.outputs.acr_login_server }}/${IMAGE_NAME_API}:${{ steps.release.outputs.sha }}" .
          docker push "${{ steps.azure.outputs.acr_login_server }}/${IMAGE_NAME_API}:${{ steps.release.outputs.sha }}"

      - name: Build and push worker image
        run: |
          docker build -f docker/Dockerfile.worker -t "${{ steps.azure.outputs.acr_login_server }}/${IMAGE_NAME_WORKER}:${{ steps.release.outputs.sha }}" .
          docker push "${{ steps.azure.outputs.acr_login_server }}/${IMAGE_NAME_WORKER}:${{ steps.release.outputs.sha }}"

      - name: Capture previous staging revision
        id: previous
        run: |
          PREVIOUS="$(az containerapp revision list --name "$STAGING_APP_NAME" --resource-group "$RESOURCE_GROUP" --query "[?properties.active].name | [0]" -o tsv 2>/dev/null || true)"
          echo "previous_revision=$PREVIOUS" >> "$GITHUB_OUTPUT"

      - name: Deploy staging ACA revision
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/aca/staging.bicep \
            --parameters appName="$STAGING_APP_NAME" \
            --parameters containerAppsEnvironmentId="$CONTAINER_APPS_ENVIRONMENT_ID" \
            --parameters workloadIdentityResourceId="$WORKLOAD_IDENTITY_RESOURCE_ID" \
            --parameters acrLoginServer="${{ steps.azure.outputs.acr_login_server }}" \
            --parameters imageName="${{ steps.azure.outputs.acr_login_server }}/${IMAGE_NAME_API}:${{ steps.release.outputs.sha }}" \
            --parameters serviceName="aegisap-api" \
            --parameters gitSha="${{ steps.release.outputs.short_sha }}" \
            --parameters imageTag="${{ steps.release.outputs.sha }}" \
            --parameters deploymentRevision="staging-${{ steps.release.outputs.short_sha }}" \
            --parameters applicationInsightsConnectionString="$APPINSIGHTS_CONNECTION_STRING" \
            --parameters traceSampleRatio="1.0" \
            --parameters tracingEnabled="true" \
            --parameters langsmithTracing="true" \
            --parameters langsmithProject="$LANGSMITH_PROJECT" \
            --parameters langsmithEndpoint="$LANGSMITH_ENDPOINT" \
            --parameters azureOpenAiEndpoint="$OPENAI_ENDPOINT" \
            --parameters azureOpenAiApiVersion="$OPENAI_API_VERSION" \
            --parameters azureOpenAiChatDeployment="$OPENAI_CHAT_DEPLOYMENT" \
            --parameters azureSearchEndpoint="$SEARCH_ENDPOINT" \
            --parameters azureSearchDay3Index="$SEARCH_DAY3_INDEX" \
            --parameters azureStorageAccountUrl="$STORAGE_ACCOUNT_URL" \
            --parameters azureStorageContainer="$STORAGE_CONTAINER" \
            --parameters azurePostgresHost="$POSTGRES_HOST" \
            --parameters azurePostgresPort="$POSTGRES_PORT" \
            --parameters azurePostgresDb="$POSTGRES_DB" \
            --parameters azurePostgresUser="$POSTGRES_USER" \
            --parameters azureKeyVaultUri="$KEY_VAULT_URI"

      - name: Resolve staging base URL
        id: endpoint
        run: |
          FQDN="$(az containerapp show --name "$STAGING_APP_NAME" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)"
          echo "base_url=https://$FQDN" >> "$GITHUB_OUTPUT"

      - name: Wait for readiness
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS "${{ steps.endpoint.outputs.base_url }}/health/ready" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "Staging app failed readiness within timeout." >&2
          exit 1

      - name: Smoke test staging deployment
        run: |
          uv run python scripts/smoke_test.py \
            --base-url "${{ steps.endpoint.outputs.base_url }}" \
            --expected-sha "${{ steps.release.outputs.short_sha }}" \
            > smoke-summary.json

      - name: Run synthetic and malicious acceptance suites
        run: |
          uv run python evals/run_eval_suite.py \
            --suite all \
            --base-url "${{ steps.endpoint.outputs.base_url }}" \
            --planner-mode fixture \
            --thresholds evals/score_thresholds.yaml \
            --output eval-summary.json \
            --enforce-thresholds

      - name: Enforce workflow cost ceilings
        run: uv run python scripts/check_cost_gates.py --summary eval-summary.json --thresholds evals/score_thresholds.yaml

      - name: Enforce resume replay safety
        run: uv run python scripts/check_resume_replay.py --base-url "${{ steps.endpoint.outputs.base_url }}" --planner-mode fixture

      - name: Enforce trace correlation
        env:
          LANGSMITH_API_KEY: ${{ secrets.AEGISAP_LANGSMITH_SERVICE_KEY }}
        run: |
          WORKFLOW_RUN_ID="$(python - <<'PY'
          import json
          payload = json.load(open("smoke-summary.json", "r", encoding="utf-8"))
          print(payload["workflow_run"]["correlation"]["workflow_run_id"])
          PY
          )"
          uv run python scripts/check_traces.py \
            --workflow-run-id "$WORKFLOW_RUN_ID" \
            --revision "${{ steps.release.outputs.short_sha }}" \
            --azure-app-id "${{ steps.azure.outputs.app_id }}" \
            --langsmith-project "$LANGSMITH_PROJECT"

      - name: Publish releasable summary
        run: |
          {
            echo "## Staging Release Candidate"
            echo ""
            echo "- SHA: \`${{ steps.release.outputs.sha }}\`"
            echo "- Base URL: \`${{ steps.endpoint.outputs.base_url }}\`"
            echo "- Previous active revision: \`${{ steps.previous.outputs.previous_revision || 'none' }}\`"
            echo "- Status: releasable if all previous steps passed"
          } >> "$GITHUB_STEP_SUMMARY"
